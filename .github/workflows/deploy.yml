name: Desplegar microservicios en EKS (CI/CD)

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # tambien se lanza a mano desde la pestana Actions

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: microservicios-eks

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar el codigo del repo
        uses: actions/checkout@v4

      - name: 2. Configurar credenciales de AWS (temporales del lab)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 3. Login en Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 4. Construir y subir las 3 imagenes (los repos ya existen en ECR)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          for svc in products-service inventory-service orders-service; do
            docker build -t "$REGISTRY/$svc:$IMAGE_TAG" -t "$REGISTRY/$svc:latest" "./$svc"
            docker push "$REGISTRY/$svc:$IMAGE_TAG"
            docker push "$REGISTRY/$svc:latest"
          done

      - name: 5. Instalar kubectl en el runner
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: 6. Conectar kubectl al cluster
        run: aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"

      - name: 7. Desplegar la app y el LoadBalancer
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          for svc in products-service inventory-service orders-service; do
            sed -i "s|<ACCOUNT_ID>|$ACCOUNT_ID|g; s|<REGION>|$AWS_REGION|g; s|:latest|:$IMAGE_TAG|g" "$svc/k8s/deployment.yaml"
            kubectl apply -f "$svc/k8s/deployment.yaml"
            kubectl apply -f "$svc/k8s/service.yaml"
          done
          kubectl apply -f orders-service-lb.yaml

      - name: 8. Esperar al rollout y mostrar el resultado (con diagnostico)
        run: |
          set +e   # no abortar al primer fallo; queremos recolectar diagnostico
          FALLO=0
          for dep in products-service inventory-service orders-service; do
            echo "::group::Rollout de $dep"
            if ! kubectl rollout status "deployment/$dep" --timeout=180s; then
              echo "ERROR: el rollout de $dep no termino. Recolectando diagnostico..."
              echo "----- describe deployment $dep -----"
              kubectl describe "deployment/$dep"
              echo "----- replicasets ($dep) -----"
              kubectl get rs -l "app=$dep" -o wide
              echo "----- pods ($dep) -----"
              kubectl get pods -l "app=$dep" -o wide
              for pod in $(kubectl get pods -l "app=$dep" -o jsonpath='{.items[*].metadata.name}'); do
                echo "===== describe pod $pod ====="
                kubectl describe "pod/$pod"
                echo "===== logs $pod (actual) ====="
                kubectl logs "$pod" --all-containers --tail=200
                echo "===== logs $pod (previo, si reinicio) ====="
                kubectl logs "$pod" --all-containers --previous --tail=200 || true
              done
              FALLO=1
            fi
            echo "::endgroup::"
          done

          echo "::group::Estado final del cluster"
          kubectl get pods -o wide
          echo "----- eventos recientes -----"
          kubectl get events --sort-by='.lastTimestamp' | tail -n 60
          echo "::endgroup::"

          if [ "$FALLO" -ne 0 ]; then
            echo "Al menos un rollout fallo. Revisa el diagnostico de arriba."
            exit 1
          fi

          echo "URL publica del LoadBalancer (tarda 2-3 min en responder):"
          kubectl get svc orders-service-lb -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'; echo